# Alembic configuration for GigSwift Agent.
#
# Autogenerate targets the SQLAlchemy metadata defined under `app/models`.
# That wiring lives in `alembic/env.py` (created in Step 3), which imports
# `app.models` and sets `target_metadata = Base.metadata`, and which reads the
# connection URL from app.core.config.Settings (DATABASE_URL) rather than from
# the `sqlalchemy.url` key below.

[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Make the project importable from env.py (so `import app.models` works).
prepend_sys_path = .

# Template used to generate migration file names; date-prefixed for ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-native path separators when interpreting version_locations.
version_path_separator = os

# Timezone for file_template timestamps (UTC keeps history consistent across hosts).
timezone = UTC

# Connection URL.
# Left blank on purpose: alembic/env.py injects DATABASE_URL from Settings so the
# async asyncpg URL is defined in exactly one place. Set a value here only if you
# want to run alembic standalone without the app config.
sqlalchemy.url =


# ---------------------------------------------------------------------------
# Post-write hooks — keep generated migrations formatted/linted with ruff.
# ---------------------------------------------------------------------------
# `exec` (not `console_scripts`): ruff ships as a prebuilt binary wheel with no
# console_scripts entry point, so it must be invoked as an executable on PATH.
[post_write_hooks]
hooks = ruff_lint, ruff_format

ruff_lint.type = exec
ruff_lint.executable = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
