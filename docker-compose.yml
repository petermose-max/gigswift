services:
  app:
    image: ghcr.io/${GITHUB_USERNAME}/gigswift:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gigswift:${DB_PASSWORD}@db:5432/gigswift
    env_file:
      - .env
    volumes:
      - telethon_data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: gigswift
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gigswift
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigswift"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  telethon_data:
